name: Deploy Image from Docker Hub

on:
  push:
    branches: [ "master" ]

jobs:
  run-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run MySQL and App
        run: |
          # MySQL
          docker run -d \
            --name db \
            -e MYSQL_DATABASE=volunteer \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -p 3307:3306 \
            mysql:8.0

          sleep 20

          # server
          docker run -d \
            --name temporary-server \
            -p 8080:8080 \
            --link db:db \
            -e DB_URL="jdbc:mysql://db:3306/volunteer?useSSL=false&allowPublicKeyRetrieval=true" \
            -e DB_USER="root" \
            -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            ***/volunteerapp:latest

          sleep 600
