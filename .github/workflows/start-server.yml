name: Deploy Image from Docker Hub

on:
  push:
    branches: [ "master" ]

jobs:
  run-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run MySQL and App
        env:
          DB_PASS: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/volunteerapp:latest
        run: |
          # MySQL
          docker run -d \
            --name db \
            -e MYSQL_DATABASE=volunteer \
            -e MYSQL_ROOT_PASSWORD="$DB_PASS" \
            -p 3307:3306 \
            mysql:8.0

          echo "Waiting for MySQL to start..."
          sleep 30

          # server
          docker run -d \
            --name temporary-server \
            -p 8080:8080 \
            --link db:db \
            -e DB_URL="jdbc:mysql://db:3306/volunteer?useSSL=false&allowPublicKeyRetrieval=true" \
            -e DB_USER="root" \
            -e DB_PASSWORD="$DB_PASS" \
            "$DOCKER_IMAGE"

          echo "Containers started successfully!"
          docker ps
          sleep 600