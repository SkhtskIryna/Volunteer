name: Deploy Image from Docker Hub

on:
  push:
    branches: [ "master" ]

jobs:
  run-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and Run Container
        run: |
          docker run -d -p 8080:8080 --name temporary-server ${{ secrets.DOCKER_USERNAME }}/volunteerapp:latest
          docker ps
          sleep 3600