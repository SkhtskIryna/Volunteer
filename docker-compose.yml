services:
  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: volunteer
      MYSQL_ROOT_PASSWORD: MyNewPass123!

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:mysql://db:3306/volunteer?useSSL=false&allowPublicKeyRetrieval=true"
