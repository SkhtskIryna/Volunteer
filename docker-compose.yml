version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: volunteer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: volunteer
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uuser", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    container_name: volunteer-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://volunteer-mysql:3306/volunteer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: user
      DB_PASSWORD: password
    ports:
      - "8080:8080"